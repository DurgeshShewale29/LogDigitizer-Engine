<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogDigitizer - Full Database View</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; }
        .cyber-border { border-color: #1f6feb; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th { background: #161b22; color: #8b949e; text-align: left; padding: 12px; border-bottom: 1px solid #30363d; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #21262d; font-size: 12px; max-width: 260px; white-space: normal; word-break: break-word; vertical-align: top; line-height: 1.5; }
        td.expandable { cursor: pointer; }
        td.expandable:hover { color: #58a6ff; text-decoration: underline dotted; }
        tr:hover { background-color: #1c2128; }
        td.action-col { white-space: nowrap; width: 220px; vertical-align: middle; }
        .dl-btn, .view-btn {
            display: inline-flex; align-items: center; gap: 5px;
            color: #fff; border-radius: 5px;
            padding: 5px 10px; font-size: 10px; font-weight: 700;
            letter-spacing: .08em; text-decoration: none; transition: all .2s;
        }
        .dl-btn {
            background: linear-gradient(135deg, #1a3a6b, #1f6feb);
            border: 1px solid #388bfd;
            box-shadow: 0 0 8px rgba(31,111,235,.3);
        }
        .view-btn {
            background: linear-gradient(135deg, #14472d, #2ea043);
            border: 1px solid #3fb950;
            box-shadow: 0 0 8px rgba(46,160,67,.3);
            margin-right: 5px;
        }
        .dl-btn:hover { background: linear-gradient(135deg, #1f6feb, #388bfd); box-shadow: 0 0 14px rgba(56,139,253,.5); }
        .view-btn:hover { background: linear-gradient(135deg, #2ea043, #3fb950); box-shadow: 0 0 14px rgba(63,185,80,.5); }

        /* Full-content modal */
        #cell-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:9999; align-items:center; justify-content:center; }
        #cell-modal.open { display:flex; }
        #cell-modal-box { background:#161b22; border:1px solid #30363d; border-radius:8px; max-width:680px; width:90%; max-height:75vh; display:flex; flex-direction:column; box-shadow:0 0 40px rgba(0,0,0,.8); }
        #cell-modal-header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid #30363d; }
        #cell-modal-title { font-size:12px; font-weight:700; letter-spacing:.1em; color:#8b949e; text-transform:uppercase; }
        #cell-modal-close { background:none; border:none; color:#8b949e; cursor:pointer; font-size:20px; line-height:1; }
        #cell-modal-close:hover { color:#fff; }
        #cell-modal-body { padding:18px; overflow-y:auto; font-size:13px; color:#c9d1d9; white-space:pre-wrap; word-break:break-word; line-height:1.7; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    
    <!-- Top Warning Banner -->
    <div class="bg-red-900 text-red-100 py-1 text-center font-bold text-sm tracking-widest border-b border-red-700 shadow-md">
        &#9888; HIGH SECURITY RESTRICTED ZONE - IOCL GUWAHATI REFINERY AIR-GAPPED ENVIRONMENT &#9888;
    </div>

    <!-- Main Header -->
    <header class="bg-gray-900 cyber-border border-b px-6 py-4 flex justify-between items-center z-10 shadow-lg">
        <div class="flex items-center space-x-4">
            <a href="/" class="text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 border border-gray-600 px-3 py-1 rounded transition-colors text-xs font-bold tracking-widest flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                BACK TO DASHBOARD
            </a>
            <div class="h-6 w-px bg-gray-700"></div>
            <h1 class="text-xl font-bold text-white tracking-wider flex items-center">
                DATABASE <span class="text-blue-400 ml-2">EXPLORER</span>
            </h1>
        </div>
        <div class="flex items-center space-x-3">
            <div class="text-xs text-gray-400 border border-gray-700 px-3 py-1 rounded bg-gray-800">
                SYSTEM STATUS: <span class="text-green-400 font-bold">ONLINE</span>
            </div>
            <button onclick="sessionStorage.removeItem('ld_authenticated'); window.location.href='/';" class="bg-red-900 hover:bg-red-700 text-white border border-red-600 px-3 py-1 rounded text-xs font-bold tracking-widest transition-colors">
                LOGOUT
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 overflow-hidden flex flex-col bg-black p-6">
        
        <!-- Tabs -->
        <div class="flex flex-wrap gap-1 mb-4 border-b border-gray-800" id="tab-bar">
            <button id="tab-docs" class="px-5 py-2 text-sm font-bold tracking-widest text-white bg-gray-800 border-t border-l border-r border-gray-600 rounded-t-lg transition-colors">
                ALL DOCUMENTS
            </button>
            <button id="tab-audit" class="px-5 py-2 text-sm font-bold tracking-widest text-gray-500 hover:text-white hover:bg-gray-800 transition-colors border-b border-gray-800">
                AUDIT LOGS
            </button>
        </div>

        <!-- Controls -->
        <div class="mb-4 flex justify-between items-center">
            <div class="flex items-center space-x-2 w-1/3">
                <span class="text-green-500 font-mono text-lg">&gt;</span>
                <input type="text" id="table-search" class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="Filter records by keyword..." autocomplete="off">
            </div>
            <div class="flex items-center space-x-4">
                <button id="delete-btn" class="hidden px-4 py-2 text-xs font-bold tracking-widest text-white bg-red-900 border border-red-700 hover:bg-red-700 rounded transition-colors shadow-lg">
                    DELETE SELECTED (<span id="delete-count">0</span>)
                </button>
                <div class="text-xs text-gray-500 tracking-wider">
                    TOTAL RECORDS: <span id="record-count" class="font-bold text-white">0</span>
                </div>
            </div>
        </div>

        <!-- Table Container -->
        <div class="flex-1 overflow-auto border border-gray-800 rounded bg-[#090c10] shadow-inner relative">
            <table id="db-table">
                <thead>
                    <tr>
                        <!-- Populated by JS -->
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
            
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 hidden">
                <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                </svg>
                <p>DATABASE IS EMPTY</p>
            </div>
        </div>
    </div>

    <!-- Full-Content Modal -->
    <div id="cell-modal">
        <div id="cell-modal-box">
            <div id="cell-modal-header">
                <span id="cell-modal-title">FIELD VALUE</span>
                <button id="cell-modal-close" onclick="document.getElementById('cell-modal').classList.remove('open')">&times;</button>
            </div>
            <div id="cell-modal-body"></div>
        </div>
    </div>

    <!-- Document View Modal (mimics ingestion UI) -->
    <div id="doc-view-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9998; align-items:center; justify-content:center; padding: 20px;">
        <div class="cyber-border bg-gray-900 rounded-lg overflow-hidden flex shadow-lg border border-gray-700" style="width: 100%; max-width: 1000px; max-height: 90vh; position: relative; flex-direction: column;">
            <button onclick="document.getElementById('doc-view-modal').style.display='none'" class="absolute top-4 right-4 text-gray-500 hover:text-white z-50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="w-full p-6 flex flex-col bg-gray-900 overflow-y-auto">
                <h3 id="doc-view-type" class="text-xl font-bold text-green-400 mb-1">Document Type</h3>
                <p id="doc-view-meta" class="text-xs text-gray-500 mb-6 pb-2 border-b border-gray-800">Metadata</p>
                
                <form id="doc-view-form" class="dynamic-form grid grid-cols-2 gap-6 flex-1">
                    <!-- Read-only inputs injected here -->
                </form>
            </div>
        </div>
    </div>

    <!-- Inject data into JS -->
    <script>
        const rawDocs = {{ records | tojson | safe }};
        const rawAudit = {{ audit_logs | default([]) | tojson | safe }};
        const serverDocTypes = {{ doc_types | default([]) | tojson | safe }};

        let currentTab = 'docs';
        let dbSchema = {};  // keyed by doc_type → { columns, rows }

        // Fetch typed-table schema from server
        fetch('/api/db-schema').then(r => r.json()).then(data => {
            dbSchema = data;
        }).catch(() => {});

        function setActiveTab(id) {
            document.querySelectorAll('#tab-bar button').forEach(b => {
                b.className = 'px-5 py-2 text-sm font-bold tracking-widest text-gray-400 hover:text-white hover:bg-gray-800 transition-colors border-b border-gray-800';
            });
            const active = document.getElementById(id) || document.querySelector(`[data-doctype="${id}"]`);
            if (active) active.className = 'px-5 py-2 text-sm font-bold tracking-widest text-white bg-gray-800 border-t border-l border-r border-gray-600 rounded-t-lg transition-colors';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const tbody = document.querySelector('#db-table tbody');
            const thead = document.querySelector('#db-table thead tr');
            const searchInput = document.getElementById('table-search');
            const countDisplay = document.getElementById('record-count');
            const emptyState = document.getElementById('empty-state');
            
            const tabDocsBtn = document.getElementById('tab-docs');
            const tabAuditBtn = document.getElementById('tab-audit');
            const deleteBtn = document.getElementById('delete-btn');
            const deleteCountSpan = document.getElementById('delete-count');
            
            let selectedIds = new Set();

            function updateDeleteButton() {
                if (selectedIds.size > 0) {
                    deleteBtn.classList.remove('hidden');
                    deleteCountSpan.textContent = selectedIds.size;
                } else {
                    deleteBtn.classList.add('hidden');
                }
            }

            function switchTab(tab, docType) {
                currentTab = tab;
                searchInput.value = '';
                selectedIds.clear();
                updateDeleteButton();
                setActiveTab(tab === 'docs' ? 'tab-docs' : tab === 'audit' ? 'tab-audit' : docType);

                if (tab === 'docs') {
                    renderTable(rawDocs, true);
                } else if (tab === 'audit') {
                    renderTable(rawAudit, false);
                } else if (tab === 'typed' && docType) {
                    // Use real SQL rows from the typed table
                    const schemaEntry = dbSchema[docType];
                    if (schemaEntry && schemaEntry.rows.length > 0) {
                        renderTypedTable(schemaEntry.rows, schemaEntry.columns, docType);
                    } else {
                        // Fallback: filter from rawDocs
                        const filtered = rawDocs.filter(r => r.Type === docType);
                        renderTable(filtered, true);
                    }
                }
            }

            tabDocsBtn.addEventListener('click', () => switchTab('docs'));
            tabAuditBtn.addEventListener('click', () => switchTab('audit'));

            function getColumns(dataArray) {
                if (!dataArray || dataArray.length === 0) return [];
                const allKeys = new Set();
                
                allKeys.add('SELECT');
                
                if (currentTab === 'docs') {
                    allKeys.add('ACTION');
                    ['DB_ID', 'Type', 'Filename', 'Timestamp'].forEach(k => allKeys.add(k));
                } else {
                    ['ID', 'Action', 'Details', 'Timestamp'].forEach(k => allKeys.add(k));
                }
                
                dataArray.forEach(row => Object.keys(row).forEach(k => allKeys.add(k)));
                return Array.from(allKeys);
            }

            function renderTable(data, isDocs) {
                thead.innerHTML = '';
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    emptyState.style.display = 'flex';
                    countDisplay.textContent = 0;
                    return;
                }
                emptyState.style.display = 'none';

                const columns = getColumns(data);

                // Render Headers
                columns.forEach(col => {
                    const th = document.createElement('th');
                    if (col === 'SELECT') {
                        th.style.width = '40px';
                        th.style.textAlign = 'center';
                        const selectAll = document.createElement('input');
                        selectAll.type = 'checkbox';
                        selectAll.className = 'w-4 h-4 cursor-pointer accent-blue-600';
                        selectAll.addEventListener('change', (e) => {
                            const isChecked = e.target.checked;
                            const checkboxes = tbody.querySelectorAll('.row-checkbox');
                            checkboxes.forEach(cb => {
                                cb.checked = isChecked;
                                const id = parseInt(cb.dataset.id);
                                if (isChecked) selectedIds.add(id);
                                else selectedIds.delete(id);
                            });
                            updateDeleteButton();
                        });
                        th.appendChild(selectAll);
                    } else {
                        th.textContent = col;
                        if (col === 'ACTION') th.style.width = '100px';
                    }
                    thead.appendChild(th);
                });

                // Render Body
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    columns.forEach(col => {
                        const td = document.createElement('td');
                        
                        if (col === 'SELECT') {
                            td.style.textAlign = 'center';
                            const cb = document.createElement('input');
                            cb.type = 'checkbox';
                            cb.className = 'row-checkbox w-4 h-4 cursor-pointer accent-blue-600';
                            
                            const rowId = isDocs ? row.DB_ID : row.ID;
                            cb.dataset.id = rowId;
                            if (selectedIds.has(rowId)) cb.checked = true;
                            
                            cb.addEventListener('change', (e) => {
                                if (e.target.checked) selectedIds.add(rowId);
                                else selectedIds.delete(rowId);
                                updateDeleteButton();
                            });
                            td.appendChild(cb);
                        } else if (col === 'ACTION' && isDocs) {
                            td.classList.add('action-col');
                            td.innerHTML = `
                                <button onclick='openFullView(${JSON.stringify(row).replace(/'/g, "&#39;")}, false)' class="view-btn">
                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    VIEW
                                </button>
                                <a href="/api/download/${row.DB_ID}" class="dl-btn" download>
                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    DOWNLOAD
                                </a>
                            `;
                        } else {
                            const val = row[col];
                            if (val !== undefined && val !== null) {
                                let displayVal;
                                let fullVal;
                                if (typeof val === 'object') {
                                    fullVal = JSON.stringify(val, null, 2);
                                    displayVal = fullVal;
                                } else {
                                    fullVal = String(val);
                                    displayVal = fullVal;
                                }
                                td.textContent = displayVal;
                                // Make long cells clickable to open full-content modal
                                if (fullVal.length > 60) {
                                    td.classList.add('expandable');
                                    td.title = 'Click to view full content';
                                    td.addEventListener('click', () => {
                                        document.getElementById('cell-modal-title').textContent = col.toUpperCase();
                                        document.getElementById('cell-modal-body').textContent = fullVal;
                                        document.getElementById('cell-modal').classList.add('open');
                                    });
                                }
                            } else {
                                td.textContent = '-';
                                td.style.color = '#484f58';
                            }
                        }
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
                countDisplay.textContent = data.length;
            }

            // Search Filtering
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                let activeData, isDocs;
                if (currentTab === 'docs') {
                    activeData = rawDocs; isDocs = true;
                } else if (currentTab === 'audit') {
                    activeData = rawAudit; isDocs = false;
                } else {
                    // typed tab — search within typed rows
                    const schemaEntry = Object.values(dbSchema).find((_, i) => Object.keys(dbSchema)[i] === currentTab);
                    if (schemaEntry) {
                        const filtered = schemaEntry.rows.filter(row =>
                            Object.values(row).some(val => String(val).toLowerCase().includes(term))
                        );
                        renderTypedTable(filtered, schemaEntry.columns, currentTab);
                    }
                    return;
                }
                const filtered = activeData.filter(row =>
                    Object.values(row).some(val => String(val).toLowerCase().includes(term))
                );
                renderTable(filtered, isDocs);
            });

            // Delete Records Logic
            deleteBtn.addEventListener('click', async () => {
                if (selectedIds.size === 0) return;
                
                if (confirm(`Are you sure you want to delete ${selectedIds.size} records? This action cannot be undone.`)) {
                    deleteBtn.textContent = 'DELETING...';
                    deleteBtn.disabled = true;
                    
                    const endpoint = currentTab === 'docs' ? '/api/delete-records' : '/api/delete-audit-logs';
                    
                    try {
                        const res = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ doc_ids: Array.from(selectedIds) })
                        });
                        
                        if (res.ok) {
                            // Reload page to get fresh data
                            window.location.reload();
                        } else {
                            alert("Failed to delete records.");
                            deleteBtn.textContent = `DELETE SELECTED (${selectedIds.size})`;
                            deleteBtn.disabled = false;
                        }
                    } catch (e) {
                        console.error(e);
                        alert("Error contacting server.");
                        deleteBtn.textContent = `DELETE SELECTED (${selectedIds.size})`;
                        deleteBtn.disabled = false;
                    }
                }
            });

            // ── renderTypedTable: shows real SQL columns per document type ──────
            function toTitleCase(str) {
                return str.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            }

            function renderTypedTable(rows, columns, docType) {
                thead.innerHTML = '';
                tbody.innerHTML = '';
                if (!rows || rows.length === 0) {
                    emptyState.style.display = 'flex';
                    countDisplay.textContent = 0;
                    return;
                }
                emptyState.style.display = 'none';

                // Skip internal cols (id, doc_id) from display
                const displayCols = columns.filter(c => c !== 'id' && c !== 'doc_id');

                // Header
                displayCols.forEach(col => {
                    const th = document.createElement('th');
                    th.textContent = toTitleCase(col);
                    if (col === 'filename') th.style.maxWidth = '140px';
                    thead.appendChild(th);
                });
                const thAction = document.createElement('th');
                thAction.textContent = 'ACTION';
                thead.appendChild(thAction);

                // Rows
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    displayCols.forEach(col => {
                        const td = document.createElement('td');
                        const val = row[col];
                        if (val !== null && val !== undefined && String(val).trim()) {
                            const fullVal = String(val);
                            td.textContent = fullVal;
                            if (fullVal.length > 60) {
                                td.classList.add('expandable');
                                td.title = 'Click to view full content';
                                td.addEventListener('click', () => {
                                    document.getElementById('cell-modal-title').textContent = toTitleCase(col);
                                    document.getElementById('cell-modal-body').textContent = fullVal;
                                    document.getElementById('cell-modal').classList.add('open');
                                });
                            }
                        } else {
                            td.textContent = '—';
                            td.style.color = '#484f58';
                        }
                        tr.appendChild(td);
                    });

                    // Typed Action Column
                    const tdAction = document.createElement('td');
                    tdAction.classList.add('action-col');
                    const realDocId = row.doc_id;
                    tdAction.innerHTML = `
                        <button onclick='openFullView(${JSON.stringify(row).replace(/'/g, "&#39;")}, true, "${docType}")' class="view-btn">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            VIEW
                        </button>
                        <a href="/api/download/${realDocId}" class="dl-btn" download>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            DOWNLOAD
                        </a>
                    `;
                    tr.appendChild(tdAction);
                    
                    tbody.appendChild(tr);
                });
                countDisplay.textContent = rows.length;
            }

            // Global function to open Full View modal
            window.openFullView = function(row, isTyped, dt = "") {
                const modal = document.getElementById('doc-view-modal');
                const form = document.getElementById('doc-view-form');
                
                const type = isTyped ? dt : row.Type;
                const filename = row.Filename || row.filename;
                const ts = row.Timestamp || row.timestamp;
                
                document.getElementById('doc-view-type').textContent = type;
                document.getElementById('doc-view-meta').textContent = `File: ${filename}  |  Parsed at: ${ts}`;
                
                form.innerHTML = '';
                
                // Exclude system fields
                const excludeKeys = ['DB_ID', 'id', 'doc_id', 'Type', 'Filename', 'filename', 'Timestamp', 'timestamp'];
                
                Object.keys(row).forEach(key => {
                    if (excludeKeys.includes(key)) return;
                    
                    let val = row[key];
                    const label = toTitleCase(key);
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'flex flex-col';
                    
                    const labelEl = document.createElement('label');
                    labelEl.className = 'text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider';
                    labelEl.textContent = label;
                    wrapper.appendChild(labelEl);
                    
                    // Table rendering
                    if (key.toLowerCase().includes('grid') || key.toLowerCase().includes('table')) {
                        wrapper.className = 'flex flex-col col-span-2';
                        try {
                            if (typeof val === 'string') {
                                val = JSON.parse(val.replace(/'/g, '"'));
                            }
                        } catch (e) {}
                        
                        if (Array.isArray(val) && val.length > 0) {
                            const table = document.createElement('table');
                            table.className = 'w-full text-xs text-left text-gray-300 border border-gray-700';
                            const trHead = document.createElement('tr');
                            trHead.className = 'bg-gray-800 text-green-400 font-bold uppercase tracking-wider border-b border-gray-700';
                            
                            const tableCols = Object.keys(val[0]);
                            tableCols.forEach(tc => {
                                const th = document.createElement('th');
                                th.className = 'px-3 py-2';
                                th.textContent = tc;
                                trHead.appendChild(th);
                            });
                            table.appendChild(trHead);
                            
                            val.forEach(r => {
                                const tr = document.createElement('tr');
                                tr.className = 'border-b border-gray-800 hover:bg-gray-800 transition-colors';
                                tableCols.forEach(tc => {
                                    const td = document.createElement('td');
                                    td.className = 'px-3 py-2 font-mono';
                                    td.textContent = r[tc];
                                    tr.appendChild(td);
                                });
                                table.appendChild(tr);
                            });
                            wrapper.appendChild(table);
                        } else {
                             const p = document.createElement('p');
                             p.className = 'text-sm text-gray-400 italic';
                             p.textContent = 'No structured data available.';
                             wrapper.appendChild(p);
                        }
                    } else {
                        // Regular field rendering
                        if (typeof val === 'string' && val.length > 60) {
                            wrapper.className = 'flex flex-col col-span-2';
                            const textarea = document.createElement('textarea');
                            textarea.className = 'bg-gray-800 text-white border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none w-full font-mono resize-y min-h-[100px]';
                            textarea.value = val;
                            textarea.readOnly = true;
                            wrapper.appendChild(textarea);
                        } else {
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.className = 'bg-gray-800 text-white border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none w-full font-mono';
                            input.value = typeof val === 'object' ? JSON.stringify(val) : val;
                            input.readOnly = true;
                            wrapper.appendChild(input);
                        }
                    }
                    
                    form.appendChild(wrapper);
                });
                
                modal.style.display = 'flex';
            };

            // Initial render
            switchTab('docs');
        });
    </script>
</body>
</html>
