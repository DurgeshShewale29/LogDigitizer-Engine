<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogDigitizer Engine - Offline Processing</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen font-sans antialiased selection:bg-orange-500 selection:text-white">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex items-center justify-between border-b border-gray-700 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                    <!-- Simple SVG icon -->
                    <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    LogDigitizer Engine
                </h1>
                <p class="text-gray-400 mt-2 text-sm uppercase tracking-wider font-semibold">Offline Air-Gapped Node</p>
            </div>
            <div class="text-right">
                <span class="inline-flex items-center gap-1.5 py-1 px-3 rounded-full text-xs font-medium bg-green-900/50 text-green-400 border border-green-800">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    System Online
                </span>
            </div>
        </header>

        <main class="grid lg:grid-cols-2 gap-8">
            <!-- Upload Section -->
            <section class="bg-gray-800/50 rounded-xl border border-gray-700 p-6 shadow-2xl backdrop-blur-sm">
                <h2 class="text-xl font-semibold text-white mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Data Ingestion
                </h2>
                
                <div id="drop-zone" class="border-2 border-dashed border-gray-600 rounded-lg p-12 text-center transition-all duration-200 hover:border-orange-500 hover:bg-gray-800 cursor-pointer group">
                    <div class="mb-4">
                        <svg class="mx-auto h-12 w-12 text-gray-500 group-hover:text-orange-400 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div class="flex flex-col text-sm text-gray-400">
                        <label for="file-upload" class="relative cursor-pointer rounded-md font-medium text-orange-500 hover:text-orange-400 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-orange-500 focus-within:ring-offset-gray-900">
                            <span>Upload a file</span>
                            <input id="file-upload" name="file-upload" type="file" class="sr-only" accept=".jpg,.jpeg,.png">
                        </label>
                        <p class="pl-1 mt-1">or drag and drop</p>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">JPEG, PNG up to 10MB</p>
                </div>
                
                <!-- Loading State -->
                <div id="loading-state" class="hidden mt-6 flex items-center justify-center p-4 bg-gray-900/50 rounded-lg border border-gray-700">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-orange-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-300">Processing Document Matrix...</span>
                </div>

                <!-- Error State -->
                <div id="error-state" class="hidden mt-6 p-4 bg-red-900/20 border border-red-800 rounded-lg">
                    <div class="flex">
                        <svg class="h-5 w-5 text-red-500 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span id="error-message" class="text-sm text-red-400 font-medium">Error processing file</span>
                    </div>
                </div>
            </section>

            <!-- Result Section -->
            <section class="bg-gray-800/50 rounded-xl border border-gray-700 p-6 shadow-2xl backdrop-blur-sm flex flex-col h-[600px]">
                <h2 class="text-xl font-semibold text-white mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    Digitized Output
                </h2>
                
                <div class="flex-grow bg-gray-900 rounded-lg border border-gray-700 overflow-hidden relative flex items-center justify-center p-2">
                    <div id="empty-result" class="text-center p-6">
                        <svg class="mx-auto h-12 w-12 text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-gray-500 text-sm">Awaiting document payload</p>
                    </div>
                    <img id="result-image" class="hidden max-h-full max-w-full object-contain rounded drop-shadow-md" alt="Processed Output" />
                </div>
                
                <div class="mt-4 flex justify-between items-center hidden" id="result-actions">
                    <p class="text-xs text-gray-400">Processing Pipeline: Grayscale → Adaptive Binarize → Hough Deskew</p>
                    <button id="download-btn" class="bg-gray-700 hover:bg-gray-600 text-white text-sm font-medium py-2 px-4 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-gray-500">
                        Download Artifact
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
